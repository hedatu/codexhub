<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f9fd" />
    <title>CodexHub 自检报告</title>
    <link rel="icon" href="/icon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="health-body">
    <main class="health-shell">
      <header class="health-hero">
        <div>
          <p class="eyebrow">CodexHub Diagnostics</p>
          <h1>自检报告</h1>
          <p>检查云端、SQLite/备份、FCM、节点同步、命令队列和更新状态。</p>
        </div>
        <div class="health-actions">
          <select id="healthLanguage" aria-label="语言 / Language">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
          <a class="btn ghost" href="/tv.html">总控大屏</a>
          <a class="btn ghost" href="/">主控制台</a>
          <button id="healthRefreshBtn" class="btn primary" type="button">重新自检</button>
        </div>
      </header>

      <form id="healthConfigForm" class="health-config">
        <label>
          <span>服务器地址</span>
          <input id="healthServerInput" type="url" placeholder="https://codex.example.com" autocomplete="url" />
        </label>
        <label>
          <span>访问令牌</span>
          <input id="healthTokenInput" type="password" placeholder="ADMIN_TOKEN 或 READONLY_TOKEN" autocomplete="current-password" />
        </label>
        <button class="btn" type="submit">保存并检查</button>
      </form>

      <section id="healthSummary" class="health-summary" aria-live="polite"></section>
      <section id="healthChecks" class="health-checks"></section>
      <section id="healthDetails" class="health-details"></section>
    </main>
    <script type="module" src="/health.js"></script>
  </body>
</html>
