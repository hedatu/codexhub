<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#03111d" />
    <title>CodexHub 总控大屏</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/tv.css" />
  </head>
  <body class="tv-body fleet-body">
    <main id="fleetApp" class="fleet-shell" data-density="compact">
      <header class="fleet-topbar">
        <section class="fleet-brand" aria-label="大屏标题">
          <p class="fleet-kicker"><span class="fleet-live-dot"></span><span data-i18n="brand.kicker">多机 Codex 线程总控中心</span></p>
          <h1 data-i18n="brand.title">CodexHub 总控大屏</h1>
          <output id="fleetHealthStrip" class="fleet-health-strip" aria-live="polite"></output>
        </section>
        <section id="fleetMetrics" class="fleet-metrics" aria-label="全局指标"></section>
        <section class="fleet-status" aria-label="同步状态">
          <strong id="fleetViewport">-- x --</strong>
          <span><i class="fleet-live-dot"></i>LIVE</span>
          <em id="fleetSync">等待同步</em>
          <label class="fleet-language" title="语言 / Language">
            <select id="fleetLanguage" aria-label="语言 / Language">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </label>
        </section>
      </header>

      <section id="fleetCommandDeck" class="fleet-command-deck hidden" aria-label="指挥操作台"></section>

      <section id="tvLogin" class="fleet-login hidden" aria-label="连接 CodexHub">
        <form id="fleetLoginForm" class="fleet-login-card">
          <div>
            <p class="fleet-kicker" data-i18n="login.kicker">CodexHub 连接</p>
            <h2 data-i18n="login.title">连接控制台</h2>
            <p data-i18n="login.desc">大屏页复用 CodexHub 访问令牌，与主控制台共用同一份节点、线程和命令队列数据。</p>
          </div>
          <label>
            <span data-i18n="login.server">服务器地址</span>
            <input id="tvServerInput" type="url" placeholder="https://hub.example.com" autocomplete="url" />
          </label>
          <label>
            <span data-i18n="login.token">访问令牌</span>
            <input id="tvTokenInput" type="password" placeholder="ADMIN_TOKEN 或 READONLY_TOKEN" autocomplete="current-password" />
          </label>
          <div class="fleet-login-actions">
            <button id="tvSaveBtn" class="fleet-button primary" type="submit" data-i18n="login.connect">连接</button>
            <button id="fleetMockBtn" class="fleet-button ghost hidden" type="button" data-i18n="login.mock">预览大屏</button>
          </div>
        </form>
      </section>

      <section id="tvContent" class="fleet-content hidden" aria-label="CodexHub 总控大屏">
        <aside class="fleet-device-rail" aria-label="设备状态">
          <div class="fleet-section-head">
            <div>
              <p class="fleet-kicker" data-i18n="sections.nodesKicker">节点</p>
              <h2 data-i18n="sections.nodes">设备状态</h2>
            </div>
            <span id="fleetNodeCount" class="fleet-count">0</span>
          </div>
          <div id="fleetDeviceFilters" class="fleet-filter-pills" aria-label="设备筛选"></div>
          <div id="fleetDevices" class="fleet-devices"></div>
        </aside>

        <section class="fleet-thread-area" aria-label="运行线程墙">
          <div class="fleet-section-head">
            <div>
              <p class="fleet-kicker" data-i18n="sections.threadsKicker">线程墙</p>
              <h2 data-i18n="sections.threads">运行线程墙</h2>
            </div>
            <div class="fleet-layout-tools">
              <label>
                <span data-i18n="controls.density">密度</span>
                <select id="fleetDensity">
                  <option value="comfortable" data-i18n="density.comfortable">舒展</option>
                  <option value="compact" selected data-i18n="density.compact">紧凑</option>
                  <option value="dense" data-i18n="density.dense">高密</option>
                </select>
              </label>
              <label>
                <span data-i18n="controls.columns">列数</span>
                <select id="fleetColumns">
                  <option value="auto" selected data-i18n="columns.auto">自动</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                </select>
              </label>
            </div>
          </div>
          <div id="fleetThreads" class="fleet-thread-grid"></div>
        </section>

        <aside class="fleet-decision-rail" aria-label="待处理与审批">
          <div class="fleet-section-head">
            <div>
              <p class="fleet-kicker" data-i18n="sections.queueKicker">待处理队列</p>
              <h2 data-i18n="sections.queue">待处理与审批</h2>
            </div>
            <span id="fleetQueueCount" class="fleet-count">0</span>
          </div>
          <div id="fleetQueue" class="fleet-queue"></div>
        </aside>
      </section>

      <footer id="fleetTimeline" class="fleet-timeline hidden" aria-label="实时事件流">
        <div class="fleet-section-head compact">
          <div>
            <p class="fleet-kicker" data-i18n="sections.eventsKicker">实时事件</p>
            <h2 data-i18n="sections.events">实时事件流</h2>
          </div>
          <div class="fleet-timeline-actions">
            <label class="fleet-switch">
              <input id="fleetAutoScroll" type="checkbox" checked />
              <span data-i18n="controls.autoScroll">自动滚动</span>
            </label>
            <button id="fleetRefreshBtn" class="fleet-button icon" type="button" title="请求电脑重新采集" aria-label="请求电脑重新采集">↻</button>
          </div>
        </div>
        <div id="fleetEvents" class="fleet-events"></div>
      </footer>
    </main>

    <section id="fleetModal" class="fleet-modal hidden" aria-modal="true" role="dialog" aria-labelledby="fleetModalTitle">
      <div class="fleet-modal-panel">
        <header class="fleet-modal-head">
          <div>
            <p id="fleetModalMeta" class="fleet-kicker">线程上下文</p>
            <h2 id="fleetModalTitle">审批与回复</h2>
          </div>
          <button id="fleetModalClose" class="fleet-button icon" type="button" title="关闭" aria-label="关闭">×</button>
        </header>
        <div id="fleetModalBody" class="fleet-modal-body"></div>
      </div>
    </section>

    <div id="fleetToast" class="fleet-toast hidden"></div>
    <script type="module" src="/tv.js"></script>
  </body>
</html>
